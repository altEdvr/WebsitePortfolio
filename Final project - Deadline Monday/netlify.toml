[build]
  base      = "Final project - Deadline Monday"
  publish   = "frontend/dist"
  functions = "netlify/functions"
  command   = "cd frontend && npm install && npm run build"

[build.environment]
  VITE_API_URL = ""

[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
